<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/vendor.css}">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div th:replace="global/header :: mainHeader"></div>
    <div class="container mt-5">
        <div class="row">
            <!-- 책 이미지 -->
            <div class="col-md-4">
                <img src="images/thumb-milk.png" class="img-fluid rounded shadow" alt="Book Cover">
            </div>

            <!-- 책 상세 정보 -->
            <div class="col-md-8">
                <h2 class="mb-3">책 제목 예시</h2>
                <p><strong>저자:</strong> 홍길동</p>
                <p><strong>출판사:</strong> DBook 출판사</p>
                <p><strong>출판일:</strong> 2025-09-15</p>
                <p class="mt-4">
                    이 책은 예시 책 설명입니다. Bootstrap을 활용해서 레이아웃을 만들었고,
                    실제 서비스에서는 DB에서 가져온 책 정보가 들어갈 수 있습니다.
                </p>
                <button class="btn btn-primary mt-3">구매하기</button>
                <button class="btn btn-outline-secondary mt-3">장바구니</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
