<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/vendor.css}">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/custom.css}">
</head>
<body>
<th:block th:replace="global/header :: mainHeader"></th:block>


<div class="container mt-5">
    <div class="row">
        <div class="col-md-3 text-center">
            <img th:src="${bookDetails.bookImageURL}"
                 class="img-fluid rounded shadow"
                 alt="Book Cover">
        </div>

        <div class="col-md-9">
            <h2 th:text="${bookDetails.bookname}">책 제목</h2>
            <p th:text="'저자정보 : ' + ${bookDetails.authors}">저자 정보</p>
            <p th:text="'출판일 : ' + ${bookDetails.publication_year}">출판일</p>
            <p th:text="'분류 : ' + ${bookDetails.publisher}">분류</p>
            <p th:text="'ISBN : ' + ${bookDetails.isbn13}">ISBN</p>

<!--        <button class="btn btn-primary mt-3">구매하기</button>
            <button class="btn btn-outline-secondary mt-3">장바구니</button>-->
        </div>
    </div>
</div>


</body>
</html>
