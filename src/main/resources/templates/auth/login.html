<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>
<body>

<div class="container d-flex justify-content-center">
  <div class="card login-container p-4 shadow-sm">
    <div class="card-body">

      <h3 class="text-center mb-4">Login</h3>

      <div class="mb-3">
        <input type="text" id="email" class="form-control" placeholder="아이디">
      </div>

      <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="비밀번호">
      </div>

      <div class="d-grid mb-3">
        <button type="button" id="loginBtn" class="btn btn-primary">
          로그인
        </button>
      </div>

      <div class="text-center mb-4">
        <a href="#" class="text-decoration-none">회원가입</a>
        <span class="mx-1">|</span>
        <a href="#" class="text-decoration-none">아이디 찾기</a>
        <span class="mx-1">|</span>
        <a href="#" class="text-decoration-none">비밀번호 찾기</a>
      </div>

      <button class="btn social-btn kakao">카카오 로그인</button>
      <button class="btn social-btn naver">네이버 로그인</button>
      <button class="btn social-btn google">구글 로그인</button>

    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
      console.log("스크립트 로드 완료");

      const loginBtn = document.getElementById("loginBtn");

      loginBtn.addEventListener("click", async () => {
          console.log("버튼 클릭됨!"); // 1. 이게 찍히는지 확인

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          console.log("보낼 데이터:", { email, password }); // 2. 데이터 확인

          try {
              const res = await fetch("/api/auth/login", {
                  method: "POST",
                  headers: {
                      "Content-Type": "application/json"
                  },
                  body: JSON.stringify({ email, password })
              });

              console.log("응답 상태 코드:", res.status); // 3. 상태 코드 확인

              if (!res.ok) {
                  const errorText = await res.text();
                  console.error("서버 에러 상세:", errorText);
                  throw new Error("서버 응답 에러");
              }

              const data = await res.json();
              localStorage.setItem("accessToken", data.accessToken);
              alert("로그인 성공!");
              location.href = "/";

          } catch (e) {
              console.error("최종 catch 에러:", e); // 4. 실제 에러 확인
              alert("아이디 또는 비밀번호를 확인하세요");
          }
      });
  });
</script>

</body>
</html>
