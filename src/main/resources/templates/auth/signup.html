<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card shadow-sm w-100" style="max-width:420px; margin-top:100px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 fw-bold">회원가입</h3>

            <form th:action="@{/auth/signup}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">이메일</label>
                    <input type="email" name="email" class="form-control" required>
                    <div class="form-text text-muted">
                        로그인 시 사용되는 이메일입니다.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">비밀번호</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">비밀번호 확인</label>
                    <input type="password" name="passwordConfirm" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">성명</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">닉네임</label>
                    <input type="text" name="nickname" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-primary">도서 배송지 주소</label>
                    <div class="input-group mb-2">
                        <input type="text" id="address" name="address" class="form-control" placeholder="주소를 검색하세요" readonly required>
                        <button class="btn btn-outline-primary" type="button" onclick="findAddress()">주소 찾기</button>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col">
                        <label class="form-label fw-semibold">성별</label>
                        <select name="gender" class="form-select">
                            <option value="">선택</option>
                            <option value="0">남성</option>
                            <option value="1">여성</option>
                            <option value="2">전체</option>
                        </select>
                    </div>

                     <div class="col">
                        <label class="form-label fw-semibold">나이</label>
                        <select name="age" class="form-select">
                            <option value="">선택</option>
                            <option value="10">10대</option>
                            <option value="20">20대</option>
                            <option value="30">30대</option>
                            <option value="40">40대+</option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary w-100">
                    회원가입
                </button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/auth/login}" class="text-decoration-none">
                    이미 계정이 있으신가요? 로그인
                </a>
            </div>
        </div>
    </div>
</div>

<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>
    function findAddress() {
        new kakao.Postcode({
            oncomplete: function(data) {
                document.getElementById('address').value = data.address;
            }
        }).open();
    }
</script>
</body>
</html>
