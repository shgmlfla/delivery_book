<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원정보 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .edit-card { max-width: 480px; margin-top: 50px; margin-bottom: 50px; }
        .form-label { font-size: 0.9rem; }
        .readonly-input { background-color: #e9ecef !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card shadow-sm w-100 edit-card">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 fw-bold">회원정보 수정</h3>

            <form th:action="@{/member/edit}" th:object="${memberUpdateDto}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">이메일</label>
                    <input type="email" th:field="*{email}" class="form-control readonly-input" readonly>
                </div>

                <hr class="my-4">

                <div class="mb-3">
                    <label class="form-label fw-semibold text-primary">도서 배송지 주소</label>
                    <div class="input-group mb-2">
                        <input type="text" th:field="*{zipcode}" class="form-control" placeholder="우편번호" readonly>
                        <button class="btn btn-outline-secondary" type="button" onclick="findAddress()">주소 찾기</button>
                    </div>
                    <input type="text" th:field="*{address}" class="form-control mb-2" placeholder="기본 주소" readonly>
                    <input type="text" th:field="*{detailAddress}" class="form-control" placeholder="상세 주소 입력">
                </div>

                <hr class="my-4">

                <div class="mb-3">
                    <label class="form-label fw-semibold">새 비밀번호</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="변경할 경우에만 입력">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">새 비밀번호 확인</label>
                    <input type="password" name="passwordConfirm" class="form-control" placeholder="비밀번호 재입력">
                </div>

                <hr class="my-4">

                <div class="mb-4">
                    <label class="form-label fw-semibold">닉네임</label>
                    <input type="text" th:field="*{nickname}" class="form-control" required>
                </div>

                <div class="row mb-4">
                    <div class="col">
                        <label class="form-label fw-semibold">성별</label>
                        <select th:field="*{gender}" class="form-select">
                            <option value="MALE">남성</option>
                            <option value="FEMALE">여성</option>
                        </select>
                    </div>
                    <div class="col">
                        <label class="form-label fw-semibold">나이</label>
                        <select th:field="*{age}" class="form-select">
                            <option value="10">10대</option>
                            <option value="20">20대</option>
                            <option value="30">30대</option>
                            <option value="40">40대+</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">수정 완료</button>
                    <a th:href="@{/mypage}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function findAddress() {
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById('zipcode').value = data.zonecode;
                document.getElementById('address').value = data.address;
                document.getElementById('detailAddress').focus();
            }
        }).open();
    }
</script>
</body>
</html>
