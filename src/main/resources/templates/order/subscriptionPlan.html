<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>dbook - 플랜 선택</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
<h2 class="text-center mb-5">나에게 맞는 독서 플랜을 선택하세요</h2>

<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm h-100">
            <div class="card-body text-center">
                <h3 th:text="${T(com.example.dbook.order.entity.PlanType).MONTHLY.description}">월간 구독</h3>
                <p class="display-6 my-3">
                    <span th:text="${#numbers.formatInteger(T(com.example.dbook.order.entity.PlanType).MONTHLY.price, 0, 'COMMA')}">10,800</span>원
                </p>
                <a th:href="@{/payment/billing(planType='MONTHLY',planName='프리미엄 정기구독')}" class="btn btn-primary w-100 rounded-pill">구독 시작하기</a>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-success shadow-sm h-100">
            <div class="card-body text-center">
                <h3 th:text="${T(com.example.dbook.order.entity.PlanType).YEARLY.description}">연간 구독</h3>
                <p class="display-6 my-3">
                    <span th:text="${#numbers.formatInteger(T(com.example.dbook.order.entity.PlanType).YEARLY.price, 0, 'COMMA')}">108,100</span>원
                </p>
                <a th:href="@{/payment/billing(planType='YEARLY',planName='프리미엄 정기구독')}" class="btn btn-success w-100 rounded-pill">구독 시작하기</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
