<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Shop</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/vendor.css}">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/mypage.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
<div th:replace="global/header :: mainHeader"></div>

<div class="container-fluid mypage-container my-5">

    <h3 class="mb-4 fw-bold">마이페이지</h3>

    <div class="p-4 border rounded-3 shadow-sm mypage-box">
        <div class="row">
            <div class="col-3">
                <div class="profile text-center p-4">
                    <img th:src="@{/images/user-profile.png}" alt="유저 프로필 이미지" class="profile-img mb-3">
                    <!-- 이미지 출처: https://www.flaticon.com/free-icon/user_847969?term=profile&page=1&position=15&origin=tag&related_id=847969 -->
                    <!--<h3 class="member-name mb-2" th:text="${nickname}">회원 이름</h3>-->
                    <h3 class="member-name mb-2">김회원님</h3>
                    <a href="/mypage/edit" class="edit-btn">회원정보 수정</a>
                </div>
            </div>
            <div class="col-6">
                오른쪽 영역(구독중인 플랜)
            </div>
            <div class="col-3 book-status-box">
                <div class="status-title">
                    <h3>이용중인 도서 현황</h3>
                </div>
                <div class="status-box p-3 text-center">
                    <div class="row text-center">
                        <div class="col-4">
                            <a href="#" class="status-btn" data-bs-toggle="modal" data-bs-target="#rentModal">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
                                </svg>
                                <div>읽고 있는 책</div>
                            </a>
                        </div>
                        <div class="col-4">
                            <a href="#" class="status-btn" data-bs-toggle="modal" data-bs-target="#completeModal">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                                </svg>
                                <div>읽은 책</div>
                            </a>
                        </div>
                        <div class="col-4">
                            <a href="#" class="status-btn" data-bs-toggle="modal" data-bs-target="#wishModal">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                                </svg>
                                <div>구매 목록</div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


</div>
<div class="container-fluid my-5">

    <!-- 이번 달의 정기배송 도서 -->
    <h3 class="mb-4 fw-bold">이번 달의 정기배송 도서</h3>

    <div class="row g-4">
        <!-- Book 1 -->
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <img src="IMAGE_URL_1" class="card-img-top" alt="book1">
                <div class="card-body text-center">
                    <h6 class="fw-semibold mb-1">우리가 빛의 속도로 갈 수 없다면(추천 도서)</h6>
                    <p class="text-muted small mb-0">김초엽</p>
                </div>
            </div>
        </div>

        <!-- Book 2 -->
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <img src="IMAGE_URL_2" class="card-img-top" alt="book2">
                <div class="card-body text-center">
                    <h6 class="fw-semibold mb-1">연간 설역(추천도서)</h6>
                    <p class="text-muted small mb-0">다자이 오사무</p>
                </div>
            </div>
        </div>

        <!-- Book 3 -->
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <img src="IMAGE_URL_3" class="card-img-top" alt="book3">
                <div class="card-body text-center">
                    <h6 class="fw-semibold mb-1">서바용 스크롤(추천도서)</h6>
                    <p class="text-muted small mb-0">지아툰 허블</p>
                </div>
            </div>
        </div>

        <!-- Book 4 -->
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <img src="IMAGE_URL_4" class="card-img-top" alt="book4">
                <div class="card-body text-center">
                    <h6 class="fw-semibold mb-1">모든 순간이 너였다</h6>
                    <p class="text-muted small mb-0">하현</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 정기배송 버튼 -->
    <div class="text-center mt-4">
        <a href="#" class="btn btn-primary px-4 py-2">
            지금 정기배송 보기
        </a>
    </div>

</div>


<!-- modal -->
<div class="modal fade" id="wishModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">📚 찜한 책</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="row g-3">

                    <!-- 책 카드 -->
                    <div class="col-4">
                        <div class="card h-100">
                            <img src="/images/book1.jpg" class="card-img" alt="book-image">
                            <div class="card-body p-2">
                                <h6 class="card-title">책 제목 예시 1</h6>
                            </div>
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="card h-100">
                            <img src="/images/book2.jpg" class="card-img" alt="book-image">
                            <div class="card-body p-2">
                                <h6 class="card-title">책 제목 예시 2</h6>
                            </div>
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="card h-100">
                            <img src="/images/book3.jpg" class="card-img" alt="book-image">
                            <div class="card-body p-2">
                                <h6 class="card-title">책 제목 예시 3</h6>
                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>


</body>
